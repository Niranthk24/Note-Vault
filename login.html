<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>login</title>

  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <nav class="navbar">
    <div class="logo">archive_01</div>

    <div class="nav-links">
      <a href="index.html">home</a>
      <a href="notes.html">archives</a>
      <a href="upload.html">contribute</a>
    </nav>

  <section class="auth-page">

    <div class="auth-box">

      <p class="small-tag">
        archive access
      </p>

      <h1>enter archive</h1>

      <input
        type="email"
        placeholder="email"
        id="loginEmail"
      >

      <input
        type="password"
        placeholder="password"
        id="loginPassword"
      >

      <button
        class="btn"
        id="loginBtn"
      >
        login
      </button>

      <p class="auth-switch">
        no account?
        <a href="signup.html">
          sign up
        </a>
      </p>

    </div>

  </section>

  <script type="module" src="js/auth.js"></script>

</body>
</html>
