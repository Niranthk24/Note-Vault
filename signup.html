<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sign up</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
    <div class="logo">archive_01</div>

    <div class="nav-links">
      <a href="index.html">home</a>
      <a href="notes.html">archives</a>
      <a href="upload.html">contribute</a>
    </nav>

  <section class="auth-page">

    <div class="auth-box">

      <p class="small-tag">
        archive access
      </p>

      <h1>create account</h1>

      <input
        type="text"
        placeholder="username"
        id="signupUsername"
      >

      <input
        type="email"
        placeholder="email"
        id="signupEmail"
      >

      <input
        type="password"
        placeholder="password"
        id="signupPassword"
      >

      <button
        class="btn"
        id="signupBtn"
      >
        sign up
      </button>

      <p class="auth-switch">
        already inside?
        <a href="login.html">
          login
        </a>
      </p>

    </div>

  </section>

  <script type="module" src="js/auth.js"></script>

</body>
</html>
